spring.application.name=equipment-maintenance-api
server.port=8080

spring.datasource.url=jdbc:h2:mem:equipmentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── E-mail (RF001) ─────────────────────────────────────────────────────────────
# Configure com um servidor SMTP real para envio de senhas no autocadastro.
# Exemplo para Gmail (requer "senha de app" nas configurações da conta Google):
#   spring.mail.host=smtp.gmail.com
#   spring.mail.port=587
#   spring.mail.username=seuemail@gmail.com
#   spring.mail.password=sua-senha-de-app
#   spring.mail.properties.mail.smtp.auth=true
#   spring.mail.properties.mail.smtp.starttls.enable=true
#
# Para desenvolvimento local sem envio real, use MailHog (porta 1025):
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT (autenticação stateless)
# Em produção: defina JWT_SECRET no ambiente (mínimo 256 bits para HS256).
jwt.secret=${JWT_SECRET:ChaveSecretaParaJWTDoProjetoEquipmentMaintenanceDeveSerLonga256BitsMinimo123456789}
jwt.expiration-ms=86400000
