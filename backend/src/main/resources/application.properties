spring.application.name=equipment-maintenance-api
server.port=8080

# UTF-8 em requisições/respostas (evita problemas com acentos em JSON; o console do PowerShell pode exigir ajuste local — ver comentário abaixo)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8

# Carga de dados de demonstração (enunciado): desative com false após primeiro run se não quiser reexecutar em dev limpo
app.seed-demo-data=true

# ── MySQL (padrão) ─────────────────────────────────────────────────────────────
# Subir o servidor: na raiz do repositório → docker compose up -d
# Credenciais padrão alinhadas ao docker-compose.yml (usuário equipment / senha equipment).
# Sobrescreva com variáveis de ambiente em produção.
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/equipment_maintenance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8}
spring.datasource.username=${MYSQL_USER:equipment}
spring.datasource.password=${MYSQL_PASSWORD:equipment}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ── Logs (dev) ─────────────────────────────────────────────────────────────────
# Habilitados temporariamente para investigar 500 em POST /api/solicitacoes.
# Em produção, reverter para WARN/INFO conforme necessário.
logging.level.br.ufpr.equipmentmaintenance=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Opcional: perfil H2 em memória → --spring.profiles.active=h2 (ver application-h2.properties)
# spring.profiles.active=h2

# ── E-mail (RF001) ─────────────────────────────────────────────────────────────
# Configure com um servidor SMTP real para envio de senhas no autocadastro.
# Exemplo para Gmail (requer "senha de app" nas configurações da conta Google):
#   spring.mail.host=smtp.gmail.com
#   spring.mail.port=587
#   spring.mail.username=seuemail@gmail.com
#   spring.mail.password=sua-senha-de-app
#   spring.mail.properties.mail.smtp.auth=true
#   spring.mail.properties.mail.smtp.starttls.enable=true
#
# Para desenvolvimento local sem envio real, use MailHog (porta 1025):
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT (autenticação stateless)
# Em produção: defina JWT_SECRET no ambiente (mínimo 256 bits para HS256).
jwt.secret=${JWT_SECRET:ChaveSecretaParaJWTDoProjetoEquipmentMaintenanceDeveSerLonga256BitsMinimo123456789}
jwt.expiration-ms=86400000
