@if (isOpen) {
  <div
    class="fixed inset-0 z-[200] flex items-center justify-center bg-black/40 p-6"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title"
    (click)="onCancel()"
  >
    <div
      class="relative w-full max-w-[480px] rounded-2xl bg-white p-8 shadow-2xl"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-start gap-4">
        <div
          class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full"
          [ngClass]="variant === 'danger' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'"
        >
          @if (variant === 'danger') {
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          } @else {
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          }
        </div>

        <div class="min-w-0 flex-1">
          <h2 class="text-lg font-bold text-[var(--color-text-primary)]">{{ title }}</h2>
          <p class="mt-2 text-sm text-gray-600 whitespace-pre-line">{{ message }}</p>
        </div>
      </div>

      <div class="mt-8 flex items-center justify-end gap-3">
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-xl border border-gray-200 bg-white px-5 py-2.5 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors"
        >
          {{ cancelLabel }}
        </button>
        <button
          type="button"
          (click)="onConfirm()"
          class="rounded-xl px-5 py-2.5 text-sm font-semibold text-white shadow-md hover:scale-[1.02] active:scale-[0.98] transition-all"
          [ngClass]="variant === 'danger' ? 'bg-red-600 hover:bg-red-700' : 'bg-[var(--color-button-primary)]'"
        >
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
