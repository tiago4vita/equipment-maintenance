<div
  *ngIf="!isPublicPage"
  class="fixed right-[148px] top-[72px] z-50 flex h-[52px] w-auto items-center gap-2 [font-family:'Inter',sans-serif]"
  role="group"
  aria-label="Perfil do usuário"
>
  <img
    src="/png/PlaceholderAvatar.png"
    alt=""
    width="52"
    height="52"
    class="size-[52px] shrink-0 rounded-full object-cover"
  />
  <div class="flex min-h-0 min-w-0 flex-1 flex-col justify-center gap-0.5 leading-none">
    <p class="truncate text-[16px] font-bold tracking-[-0.48px] text-[var(--color-text-primary)]">
      Olá {{ displayName }}!
    </p>
    <p class="truncate text-[14px] font-normal tracking-[-0.42px] text-[var(--color-text-muted)]">
      {{ userTypeLabel }}
    </p>
  </div>
  
</div>
