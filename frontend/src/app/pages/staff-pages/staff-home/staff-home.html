<main class="relative min-h-screen bg-[var(--color-surface-page)] [font-family:'Inter',sans-serif]">

  <app-staff-navbar></app-staff-navbar>

  <div class="ml-[320px] mt-[120px] w-[calc(100%-360px)] max-w-[1440px]">
    <section class="mb-6 flex items-center justify-between">
      <h1 class="text-[32px] font-bold text-[var(--color-text-primary)]">Solicitações Abertas</h1>
    </section>

    <div class="rounded-2xl border border-gray-200 bg-white shadow-lg overflow-hidden">
      
      <div class="grid grid-cols-4 bg-gray-50 px-6 py-4 border-b border-gray-200 font-bold text-[14px] uppercase tracking-wider text-[var(--color-text-primary)]">
        <div>Data/Hora</div>
        <div>Cliente</div>
        <div>Descrição do Produto</div>
        <div class="text-center">Ações</div>
      </div>

      <div class="max-h-[500px] overflow-y-auto custom-scrollbar">
        
        <div *ngFor="let item of solicitacoesAbertas" 
             class="grid grid-cols-4 items-center px-6 py-3 border-b border-gray-100 bg-white hover:bg-gray-50 transition-all">
          
          <div class="text-[14px] text-gray-600">{{ item.dataAbertura | date:'dd/MM/yyyy HH:mm' }}</div>
          
          <div class="text-[15px] font-semibold text-[var(--color-text-primary)]">{{ getNomeCliente(item.clienteId) }}</div>
          
          <div class="text-[14px] text-gray-600 truncate pr-4">{{ item.produto }}</div>

          <div class="flex justify-center">
            <button
              (click)="irParaOrcamento(item.id)"
              class="rounded-[15px] bg-[var(--color-text-primary)] px-5 py-1.5 text-[14px] font-medium text-white transition-all hover:scale-[1.02]"
            >
              Efetuar Orçamento
            </button>
          </div>
        </div>

        <div *ngIf="solicitacoesAbertas.length === 0" class="p-10 text-center text-gray-400">
          Nenhuma solicitação aguardando atenção no momento.
        </div>

      </div>
    </div>
  </div>
</main>
