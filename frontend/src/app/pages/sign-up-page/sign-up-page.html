<div class="min-h-screen flex items-center justify-center gap-32 bg-gray-100 px-6">

  <div class="left-24 flex items-center">
    <img
      src="/svg/TadsSystems.svg"
      alt="TADS Systems"
      class="h-[78px] w-auto max-w-[640px]"
      width="554"
      height="78"
    />
  </div>

  <section class="w-full max-w-3xl">
    <form
      [formGroup]="signUpForm"
      (ngSubmit)="submit()"
      class="flex w-full flex-col gap-6 rounded-2xl border border-gray-200 bg-white px-8 py-8 shadow-lg">
      <h1
        class="relative self-stretch [font-family:'Inter',sans-serif] text-2xl font-semibold text-center leading-[38.4px] tracking-[-0.96px] text-[var(--color-text-primary)]"
      >
        Crie sua conta
      </h1>

      @if (errorMessage()) {
        <p class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700" role="alert">
          {{ errorMessage() }}
        </p>
      }

      <div class="relative flex w-full flex-[0_0_auto] flex-col items-center justify-center gap-[25px] self-stretch">
        <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2.5 self-stretch">
          @for (field of formFields; track field.id) {
            <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-3 self-stretch">
              <label
                [for]="field.id"
                class="relative h-[18px] self-stretch [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] whitespace-nowrap text-[var(--color-text-primary)]"
              >
                {{ field.label }}
                @if (field.required) {
                  <span class="badge-required">obrigatório</span>
                }
              </label>

              <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2 self-stretch">
                <div
                  class="flex w-full items-center rounded-lg border border-gray-300 bg-gray-50 px-4 py-3 transition-all focus-within:border-black focus-within:bg-white focus-within:ring-2 focus-within:ring-black/10"
                >
                  <input
                    [id]="field.id"
                    [type]="field.type"
                    [formControlName]="field.id"
                    [placeholder]="field.placeholder"
                    [required]="field.required"
                    [attr.aria-required]="field.required"
                    [attr.maxlength]="field.maxLength ?? null"
                    [attr.inputmode]="field.inputMode ?? null"
                    class="relative w-full bg-transparent [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] outline-none"
                  />
                </div>
              </div>
            </div>
          }

          <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-3 self-stretch">
            <div class="relative flex w-full flex-[0_0_auto] flex-wrap items-center gap-[17px] self-stretch">
              <div class="relative flex w-[401px] flex-col items-start gap-3">
                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-3 self-stretch">
                  <label
                    for="address"
                    class="relative h-[18px] self-stretch [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] flex items-center gap-2 text-[var(--color-text-primary)]"
                  >
                    Endereço
                    <span class="badge-required">obrigatório</span>
                  </label>
                </div>

                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2 self-stretch">
                  <div
                    class="relative flex w-full flex-[0_0_auto] items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-gray-50 px-4 py-3"
                  >
                    <input
                      id="address"
                      type="text"
                      formControlName="address"
                      placeholder="Preenchido automaticamente pelo CEP"
                      required
                      aria-required="true"
                      class="relative w-full bg-transparent [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] outline-none"
                    />
                  </div>
                </div>
              </div>

              <div class="relative flex h-[76px] grow flex-1 flex-col items-start gap-3">
                <div class="relative flex w-full grow flex-1 flex-col items-start gap-3 self-stretch">
                  <label
                    for="number"
                    class="relative h-[19px] w-[25px] [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] flex items-center gap-2 text-[var(--color-text-primary)]"
                  >
                    N&deg;
                    <span class="badge-required">obrigatório</span>
                  </label>
                </div>

                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2 self-stretch">
                  <div
                    class="relative flex w-full flex-[0_0_auto] items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-[var(--color-surface-page)] px-4 py-3"
                  >
                    <input
                      id="number"
                      type="text"
                      formControlName="number"
                      placeholder="Digite o número"
                      required
                      aria-required="true"
                      maxlength="20"
                      class="w-full bg-transparent text-base outline-none placeholder:text-gray-400"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-3 self-stretch">
            <div class="relative flex w-full flex-[0_0_auto] flex-wrap items-center gap-[17px] self-stretch">
              <div class="relative flex w-[401px] flex-col items-start gap-3">
                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-3 self-stretch">
                  <label
                    for="bairro"
                    class="relative h-[18px] self-stretch [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] flex items-center gap-2 text-[var(--color-text-primary)]"
                  >
                    Bairro
                    <span class="badge-required">obrigatório</span>
                  </label>
                </div>

                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2 self-stretch">
                  <div
                    class="relative flex w-full flex-[0_0_auto] items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-gray-50 px-4 py-3"
                  >
                    <input
                      id="bairro"
                      type="text"
                      formControlName="bairro"
                      placeholder="Preenchido automaticamente pelo CEP"
                      required
                      aria-required="true"
                      maxlength="100"
                      class="relative w-full bg-transparent [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] outline-none"
                    />
                  </div>
                </div>
              </div>

              <div class="relative flex grow flex-1 flex-col items-start gap-3">
                <div class="relative flex w-full grow flex-1 flex-col items-start gap-3 self-stretch">
                  <label
                    for="complemento"
                    class="relative h-[19px] [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] flex items-center gap-2 text-[var(--color-text-primary)]"
                  >
                    Complemento
                  </label>
                </div>

                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2 self-stretch">
                  <div
                    class="relative flex w-full flex-[0_0_auto] items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-[var(--color-surface-page)] px-4 py-3"
                  >
                    <input
                      id="complemento"
                      type="text"
                      formControlName="complemento"
                      placeholder="Apto, bloco, referência (opcional)"
                      maxlength="150"
                      class="w-full bg-transparent text-base outline-none placeholder:text-gray-400"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button
          type="submit"
          class="relative flex w-full flex-[0_0_auto] cursor-pointer items-center justify-center gap-2.5 rounded-lg bg-black hover:bg-black/90 disabled:bg-gray-300 text-white font-semibold py-3"
          [disabled]="signUpForm.invalid || submitting()"
          aria-label="Criar conta"
        >
          <span
            class="relative w-fit [font-family:'Inter',sans-serif] text-lg font-semibold leading-[21.6px] tracking-[-0.54px] whitespace-nowrap text-white"
          >
            @if (submitting()) {
              Enviando…
            } @else {
              Criar conta
            }
          </span>
        </button>

        <p class="text-center text-sm text-gray-600">
          Já possui conta?
          <a routerLink="/login" class="font-semibold text-black underline hover:no-underline">
            Voltar ao login
          </a>
        </p>
      </div>
    </form>
  </section>
</div>
