<div class="relative min-h-screen min-w-[1920px] bg-[var(--color-surface-page)]">

  <div class="absolute left-[119px] top-[494px] flex h-[95px] w-[640px] items-center">
    <p
      class="[font-family:'Inter',sans-serif] text-[64px] font-semibold leading-none tracking-[-1.28px] text-[var(--color-text-primary)]"
    >
      TADS Systems
      <span class="align-top text-[18px] font-medium">&reg;</span>
    </p>
  </div>

  <section class="absolute left-[764px] top-[186px]">
    <form
      [formGroup]="signUpForm"
      (ngSubmit)="submit()"
      class="relative flex h-[600px] w-[864px] flex-col items-center gap-3 overflow-hidden rounded-2xl border border-solid border-[var(--color-text-muted)] bg-[var(--color-surface-card)] px-10 py-[30px]"
    >
      <h1
        class="relative self-stretch [font-family:'Inter',sans-serif] text-center text-[32px] font-medium leading-[38.4px] tracking-[-0.96px] text-[var(--color-text-primary)]"
      >
        Crie sua conta
      </h1>

      <div class="relative flex w-full flex-[0_0_auto] flex-col items-center justify-center gap-[25px] self-stretch">
        <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2.5 self-stretch">
          @for (field of formFields; track field.id) {
            <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-3 self-stretch">
              <label
                [for]="field.id"
                class="relative h-[18px] self-stretch [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] whitespace-nowrap text-[var(--color-text-primary)]"
              >
                {{ field.label }}
              </label>

              <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2 self-stretch">
                <div
                  class="relative flex w-full flex-[0_0_auto] items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-[var(--color-surface-page)] px-4 py-3"
                >
                  <input
                    [id]="field.id"
                    [type]="field.type"
                    [formControlName]="field.id"
                    [placeholder]="field.placeholder"
                    [required]="field.required"
                    [attr.aria-required]="field.required"
                    class="relative w-full [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px]"
                  />
                </div>
              </div>
            </div>
          }

          <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-3 self-stretch">
            <div class="relative flex w-full flex-[0_0_auto] flex-wrap items-center gap-[17px] self-stretch">
              <div class="relative flex w-[401px] flex-col items-start gap-3">
                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-3 self-stretch">
                  <label
                    for="address"
                    class="relative h-[18px] self-stretch [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] whitespace-nowrap text-[var(--color-text-primary)]"
                  >
                    Endereço*
                  </label>
                </div>

                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2 self-stretch">
                  <div
                    class="relative flex w-full flex-[0_0_auto] items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-[var(--color-surface-page)] px-4 py-3"
                  >
                    <input
                      id="address"
                      type="text"
                      formControlName="address"
                      placeholder="Digite seu endereço..."
                      required
                      aria-required="true"
                      class="relative w-full [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px]"
                    />
                  </div>
                </div>
              </div>

              <div class="relative flex h-[76px] grow flex-1 flex-col items-start gap-3">
                <div class="relative flex w-full grow flex-1 flex-col items-start gap-3 self-stretch">
                  <label
                    for="number"
                    class="relative h-[19px] w-[25px] [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px] whitespace-nowrap text-[var(--color-text-primary)]"
                  >
                    N&deg;
                  </label>
                </div>

                <div class="relative flex w-full flex-[0_0_auto] flex-col items-start gap-2 self-stretch">
                  <div
                    class="relative flex w-full flex-[0_0_auto] items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-[var(--color-surface-page)] px-4 py-3"
                  >
                    <input
                      id="number"
                      type="text"
                      formControlName="number"
                      placeholder="Digite o número..."
                      required
                      aria-required="true"
                      class="relative w-full [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px]"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button
          type="submit"
          class="relative flex w-full flex-[0_0_auto] cursor-pointer items-center justify-center gap-2.5 rounded-lg bg-[var(--color-button-primary)] px-5 py-2.5 transition-colors hover:bg-[var(--color-button-primary-hover)] disabled:cursor-not-allowed disabled:bg-[var(--color-button-primary-disabled)]"
          [disabled]="signUpForm.invalid"
          aria-label="Criar conta"
        >
          <span
            class="relative w-fit [font-family:'Inter',sans-serif] text-lg font-semibold leading-[21.6px] tracking-[-0.54px] whitespace-nowrap text-white"
          >
            Criar conta
          </span>
        </button>
      </div>
    </form>
  </section>
</div>
