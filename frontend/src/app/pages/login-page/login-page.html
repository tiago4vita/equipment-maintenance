<div class="relative min-h-screen flex items-center justify-center gap-80 bg-gray-100 px-24">

  <div class="flex items-center">
    
    <img
      src="/svg/TadsSystems.svg"
      alt="TADS Systems"
      class="h-[78px] w-auto max-w-[640px]"
      width="554"
      height="78"
    />
  </div>

  <section
    class="flex w-[432px] flex-col gap-4 rounded-2xl border border-[rgba(0,0,0,0.05)] bg-white px-10 py-8 shadow-[0_10px_30px_rgba(0,0,0,0.08)] backdrop-blur-sm"
  >
    <h1 class="text-2xl font-semibold text-gray-900" align="center"> Log in </h1>
  

    <form
      [formGroup]="loginForm"
      (ngSubmit)="submit()"
      class="flex w-full flex-col gap-4"
    >
      @if (errorMessage()) {
        <p class="w-full rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800" role="alert">
          {{ errorMessage() }}
        </p>
      }

      <div class="flex w-full flex-col items-start gap-2.5">
        <div
          class="flex w-full items-center rounded-lg border border-gray-300 bg-gray-50 px-4 py-3 transition-all focus-within:border-black focus-within:bg-white focus-within:ring-2 focus-within:ring-black/10"
        >
          <label for="email" class="sr-only">E-mail</label>
          <input
            id="email"
            formControlName="email"
            type="email"
            placeholder="Digite seu e-mail..."
            class="w-full bg-transparent text-base outline-none placeholder:text-gray-400"
          />
        </div>

        <div
          class="flex w-full items-center rounded-lg border border-gray-300 bg-gray-50 px-4 py-3 transition-all focus-within:border-black focus-within:bg-white focus-within:ring-2 focus-within:ring-black/10"
        >
          <label for="password" class="sr-only">Senha</label>
          <input
            id="password"
            formControlName="password"
            type="password"
            placeholder="Digite sua senha..."
            class="w-full bg-transparent text-base outline-none placeholder:text-gray-400"
          />
        </div>
      </div>

      <div class="flex h-[93px] w-full flex-col items-center justify-center gap-1.5 rounded-2xl bg-transparent">
        
        <!-- Botão -->
        <button
          type="submit"
          class="w-full rounded-lg bg-black py-3 text-white font-semibold transition hover:bg-black/90 disabled:bg-gray-300"
          [disabled]="loginForm.invalid || submitting()"
          aria-label="Entrar"
        >
          <span
            class="[font-family:'Inter',sans-serif] text-lg font-semibold leading-[21.6px] tracking-[-0.54px] text-[var(--color-surface-card)]"
          >
            Entrar
          </span>
        </button>


        <p
          class="[font-family:'Inter',sans-serif] text-sm font-normal leading-[16.8px] tracking-[-0.42px] text-[var(--color-text-primary)]"
        >
          Não possui uma conta?
          <a
            routerLink="/sign-up"
            class="cursor-pointer underline transition-colors hover:text-[#1c1c1c]"
            aria-label="Criar uma conta"
          >
            Crie uma
          </a>
        </p>
      </div>
    </form>
  </section>
</div>
