<div class="relative min-h-screen min-w-[1920px] bg-[var(--color-surface-page)]">

  <div class="absolute left-[119px] top-[494px] flex h-[95px] w-[640px] items-center">
    <p
      class="[font-family:'Inter',sans-serif] text-[64px] font-semibold leading-none tracking-[-1.28px] text-[var(--color-text-primary)]"
    >
      TADS Systems
      <span class="align-top text-[18px] font-medium">&reg;</span>
    </p>
  </div>

  <section
    class="absolute left-[1120px] top-[417px] flex h-[272px] w-[432px] flex-col items-center gap-2.5 overflow-hidden rounded-2xl border border-solid border-[var(--color-text-muted)] bg-[var(--color-surface-card)] px-10 py-[15px]"
  >
    <h1
      class="h-[42px] self-stretch text-center [font-family:'Inter',sans-serif] text-[32px] font-medium leading-[38.4px] tracking-[-0.96px] text-[var(--color-text-primary)]"
    >
      Log In
    </h1>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="submit()"
      class="mb-[-15px] ml-[-8px] mr-[-8px] flex h-[205px] w-[368px] flex-col items-center justify-center gap-2.5"
    >
      <div class="flex w-full flex-col items-start gap-2.5">
        <div
          class="flex w-full items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-[var(--color-surface-page)] px-4 py-3"
        >
          <label for="email" class="sr-only">E-mail</label>
          <input
            id="email"
            formControlName="email"
            type="email"
            placeholder="Digite seu e-mail..."
            aria-label="Digite seu e-mail"
            class="w-full [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px]"
          />
        </div>

        <div
          class="flex w-full items-center gap-2.5 rounded-lg border border-solid border-[var(--color-border-subtle)] bg-[var(--color-surface-page)] px-4 py-3"
        >
          <label for="password" class="sr-only">Senha</label>
          <input
            id="password"
            formControlName="password"
            type="password"
            placeholder="Digite sua senha..."
            aria-label="Digite sua senha"
            class="w-full [font-family:'Inter',sans-serif] text-lg font-normal leading-[21.6px] tracking-[-0.54px]"
          />
        </div>
      </div>

      <div class="flex h-[93px] w-full flex-col items-center justify-center gap-1.5 rounded-2xl bg-[var(--color-surface-card)]">
        <button
          type="submit"
          class="flex w-[368px] cursor-pointer items-center justify-center gap-2.5 rounded-lg bg-[var(--color-button-primary)] px-5 py-2.5 transition-colors hover:bg-[var(--color-button-primary-hover)] disabled:cursor-not-allowed disabled:bg-[var(--color-button-primary-disabled)]"
          [disabled]="loginForm.invalid"
          aria-label="Entrar"
        >
          <span
            class="[font-family:'Inter',sans-serif] text-lg font-semibold leading-[21.6px] tracking-[-0.54px] text-[var(--color-surface-card)]"
          >
            Entrar
          </span>
        </button>

        <p
          class="[font-family:'Inter',sans-serif] text-sm font-normal leading-[16.8px] tracking-[-0.42px] text-[var(--color-text-primary)]"
        >
          Não possui uma conta?
          <a
            routerLink="/sign-up"
            class="cursor-pointer underline transition-colors hover:text-[#1c1c1c]"
            aria-label="Criar uma conta"
          >
            Crie uma
          </a>
        </p>
      </div>
    </form>
  </section>
</div>
