# Stack de desenvolvimento local do equipment-maintenance.
# Uso: na raiz do repositório → docker compose up -d
#
# MySQL: localhost:3306
# Adminer (interface web para o banco): http://localhost:8081
#   Servidor: mysql  |  Usuário: equipment  |  Senha: equipment  |  Base: equipment_maintenance
# MailHog (SMTP fake para o RF001 — autocadastro):
#   SMTP em localhost:1025 (consumido pelo backend)
#   UI web em http://localhost:8025 (lê os e-mails enviados em dev)

services:
  mysql:
    image: mysql:8.4
    container_name: equipment-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: equipment_maintenance
      MYSQL_USER: equipment
      MYSQL_PASSWORD: equipment
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - equipment-mysql-data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: equipment-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql

  mailhog:
    image: mailhog/mailhog:latest
    container_name: equipment-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  equipment-mysql-data:
